<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

    <div class="auth-container">
        <h2>Register</h2>

        <input type="text" id="name" placeholder="Name">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">

        <button onclick="register()">Registrarme</button>
        <button type="button" onclick="window.location.href='index.html'" 
            style="background: #6b7280; width: 100%; margin-top: 10px; padding: 10px; font-weight: bold; color: white; border: none; border-radius: 5px; cursor: pointer;"
            >Volver al Catálogo</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="js/firebase-config.js"></script>

    <script src="js/auth.js"></script>

</body>

</html>
